<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img">
<title>ISR and clock mapping variation</title>
<desc>Logarithmic comparison of standard deviation sources.</desc>
<rect width="100%" height="100%" fill="#ffffff"/>
<style>text{font-family:Inter,system-ui,sans-serif;fill:#0f172a}.title{font-size:22px;font-weight:700}.subtitle{font-size:13px;fill:#64748b}.axis{font-size:12px;fill:#64748b}.legend{font-size:12px}</style>
<text x="70.00" y="38.00" class="title" text-anchor="start">The GPIO interrupt is not the variable term</text>
<text x="70.00" y="61.00" class="subtitle" text-anchor="start">Population standard deviation across 90 retained SCHED_RR edges; logarithmic scale</text>
<line x1="120.00" y1="415.00" x2="820.00" y2="415.00" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="419.00" class="axis" text-anchor="end">0.01</text>
<line x1="120.00" y1="365.70" x2="820.00" y2="365.70" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="369.70" class="axis" text-anchor="end">0.03</text>
<line x1="120.00" y1="311.67" x2="820.00" y2="311.67" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="315.67" class="axis" text-anchor="end">0.1</text>
<line x1="120.00" y1="262.36" x2="820.00" y2="262.36" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="266.36" class="axis" text-anchor="end">0.3</text>
<line x1="120.00" y1="208.33" x2="820.00" y2="208.33" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="212.33" class="axis" text-anchor="end">1</text>
<line x1="120.00" y1="159.03" x2="820.00" y2="159.03" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="163.03" class="axis" text-anchor="end">3</text>
<line x1="120.00" y1="105.00" x2="820.00" y2="105.00" stroke="#dbe4ee" stroke-width="1.00" opacity="1.000"/>
<text x="106.00" y="109.00" class="axis" text-anchor="end">10</text>
<rect x="210.00" y="377.20" width="130.00" height="37.80" fill="#059669" stroke="none" stroke-width="1.00" opacity="1.000" rx="4.00"/>
<text x="275.00" y="365.20" class="axis" text-anchor="middle" font-weight="700">0.023 µs</text>
<text x="275.00" y="443.00" class="axis" text-anchor="middle">MCU ISR differential</text>
<rect x="420.00" y="162.94" width="130.00" height="252.06" fill="#ea580c" stroke="none" stroke-width="1.00" opacity="1.000" rx="4.00"/>
<text x="485.00" y="150.94" class="axis" text-anchor="middle" font-weight="700">2.749 µs</text>
<text x="485.00" y="443.00" class="axis" text-anchor="middle">Host/mapping term</text>
<rect x="630.00" y="162.91" width="130.00" height="252.09" fill="#2563eb" stroke="none" stroke-width="1.00" opacity="1.000" rx="4.00"/>
<text x="695.00" y="150.91" class="axis" text-anchor="middle" font-weight="700">2.751 µs</text>
<text x="695.00" y="443.00" class="axis" text-anchor="middle">Physical edge skew</text>
<text x="850.00" y="180.00" class="axis" text-anchor="start" font-weight="700">Mapping variation is</text>
<text x="850.00" y="218.00" class="title" text-anchor="middle">118×</text>
<text x="850.00" y="244.00" class="axis" text-anchor="middle">the ISR variation</text>
<text x="33.00" y="260.00" class="axis" text-anchor="middle" transform="rotate(-90 33.00 260.00)">Standard deviation (µs, log scale)</text>
</svg>
