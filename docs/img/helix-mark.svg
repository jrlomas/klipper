<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="HELIX">
  <defs>
    <linearGradient id="hx" x1="20" y1="14" x2="100" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7df3e0"/>
      <stop offset="0.55" stop-color="#3ae0c9"/>
      <stop offset="1" stop-color="#12a794"/>
    </linearGradient>
  </defs>
  <!-- helix axis -->
  <line x1="60" y1="16" x2="60" y2="104" stroke="#3ae0c9" stroke-opacity="0.18" stroke-width="2"/>
  <!-- five coil loops: faint back half (behind the axis) + bold front half -->
  <g fill="none" stroke-linecap="round">
    <!-- back (top) arcs, receding -->
    <g stroke="#3ae0c9" stroke-opacity="0.28" stroke-width="6.5">
      <path d="M28 26 A32 11 0 0 0 92 26"/>
      <path d="M28 45 A32 11 0 0 0 92 45"/>
      <path d="M28 64 A32 11 0 0 0 92 64"/>
      <path d="M28 83 A32 11 0 0 0 92 83"/>
    </g>
    <!-- front (bottom) arcs, bold gradient -->
    <g stroke="url(#hx)" stroke-width="8.5">
      <path d="M28 26 A32 11 0 0 1 92 26"/>
      <path d="M28 45 A32 11 0 0 1 92 45"/>
      <path d="M28 64 A32 11 0 0 1 92 64"/>
      <path d="M28 83 A32 11 0 0 1 92 83"/>
    </g>
  </g>
</svg>
