<svg xmlns="http://www.w3.org/2000/svg" width="920" height="470" viewBox="0 0 920 470" role="img" aria-labelledby="title desc">
  <title id="title">STM32H723 aggregate HELIX quintic solver capacity</title>
  <desc id="desc">Four configurations pass at 640 thousand aggregate crossings per second with 25 percent reserve. Higher probes at one to 1.28 million crossings per second are rejected.</desc>
  <rect width="920" height="470" fill="#111827"/>
  <text x="460" y="38" text-anchor="middle" fill="#f9fafb" font-family="sans-serif" font-size="24" font-weight="700">H723 aggregate curved-crossing capacity</text>
  <text x="460" y="65" text-anchor="middle" fill="#9ca3af" font-family="sans-serif" font-size="14">520 MHz, production solver, 1/8-step spatial gate, 25% deadline reserve</text>

  <line x1="150" y1="390" x2="850" y2="390" stroke="#6b7280" stroke-width="2"/>
  <line x1="150" y1="95" x2="150" y2="390" stroke="#6b7280" stroke-width="2"/>
  <g fill="#9ca3af" font-family="sans-serif" font-size="13" text-anchor="end">
    <text x="140" y="395">0</text>
    <text x="140" y="338">250k</text>
    <text x="140" y="280">500k</text>
    <text x="140" y="223">750k</text>
    <text x="140" y="165">1.0M</text>
    <text x="140" y="108">1.25M</text>
  </g>
  <g stroke="#374151" stroke-width="1">
    <line x1="150" y1="333" x2="850" y2="333"/>
    <line x1="150" y1="275" x2="850" y2="275"/>
    <line x1="150" y1="218" x2="850" y2="218"/>
    <line x1="150" y1="160" x2="850" y2="160"/>
    <line x1="150" y1="103" x2="850" y2="103"/>
  </g>

  <g font-family="sans-serif" text-anchor="middle">
    <g fill="#10b981">
      <rect x="190" y="243" width="58" height="147" rx="4"/>
      <rect x="360" y="243" width="58" height="147" rx="4"/>
      <rect x="530" y="243" width="58" height="147" rx="4"/>
      <rect x="700" y="243" width="58" height="147" rx="4"/>
    </g>
    <g fill="#ef4444">
      <rect x="252" y="160" width="34" height="230" rx="4" opacity="0.85"/>
      <rect x="422" y="95" width="34" height="295" rx="4" opacity="0.85"/>
      <rect x="592" y="95" width="34" height="295" rx="4" opacity="0.85"/>
      <rect x="762" y="95" width="34" height="295" rx="4" opacity="0.85"/>
    </g>
    <g fill="#f9fafb" font-size="13" font-weight="700">
      <text x="219" y="235">640k pass</text>
      <text x="389" y="235">640k pass</text>
      <text x="559" y="235">640k pass</text>
      <text x="729" y="235">640k pass</text>
    </g>
    <g fill="#fca5a5" font-size="12">
      <text x="269" y="151">1.0M reject</text>
      <text x="439" y="86">1.28M reject</text>
      <text x="609" y="86">1.28M reject</text>
      <text x="779" y="86">1.28M reject</text>
    </g>
    <g fill="#d1d5db" font-size="15">
      <text x="238" y="422">1 virtual axis</text>
      <text x="408" y="422">2 virtual axes</text>
      <text x="578" y="422">4 virtual axes</text>
      <text x="748" y="422">8 virtual axes</text>
    </g>
  </g>
  <g font-family="sans-serif" font-size="13">
    <rect x="650" y="442" width="16" height="12" fill="#10b981"/><text x="673" y="453" fill="#d1d5db">qualified</text>
    <rect x="754" y="442" width="16" height="12" fill="#ef4444" opacity="0.85"/><text x="777" y="453" fill="#d1d5db">deadline rejected</text>
  </g>
</svg>
