<svg xmlns="http://www.w3.org/2000/svg" width="920" height="350" viewBox="0 0 920 350" role="img" aria-labelledby="title desc">
  <title id="title">STM32G0B1 Helix extruder qualification envelope</title>
  <desc id="desc">A rate axis marks the hot audited path near 7.3 thousand steps per second, the reserve-qualified solver at 20 thousand, and the rejected reserve test at 40 thousand.</desc>
  <rect width="920" height="350" fill="#10151d" rx="12"/>
  <style>
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #e8edf2; }
    .muted { fill: #9eabb8; font-size: 12px; }
    .grid { stroke: #34404d; stroke-width: 1; }
  </style>
  <text x="26" y="34" font-size="20" font-weight="700">STM32G0B1 practical extrusion-rate qualification</text>
  <text x="26" y="55" class="muted">EBB36 v1.2, 64 MHz; 705.5 steps/mm filament; 25% IRQ reserve required</text>
  <line x1="90" y1="238" x2="850" y2="238" stroke="#8795a5" stroke-width="2"/>
  <g class="grid">
    <line x1="90" y1="90" x2="90" y2="255"/><line x1="280" y1="90" x2="280" y2="255"/>
    <line x1="470" y1="90" x2="470" y2="255"/><line x1="660" y1="90" x2="660" y2="255"/>
    <line x1="850" y1="90" x2="850" y2="255"/>
  </g>
  <text x="90" y="278" text-anchor="middle" class="muted">0</text>
  <text x="280" y="278" text-anchor="middle" class="muted">10k</text>
  <text x="470" y="278" text-anchor="middle" class="muted">20k</text>
  <text x="660" y="278" text-anchor="middle" class="muted">30k</text>
  <text x="850" y="278" text-anchor="middle" class="muted">40k steps/s</text>
  <text x="90" y="302" text-anchor="middle" class="muted">0</text>
  <text x="280" y="302" text-anchor="middle" class="muted">14.2</text>
  <text x="470" y="302" text-anchor="middle" class="muted">28.3</text>
  <text x="660" y="302" text-anchor="middle" class="muted">42.5</text>
  <text x="850" y="302" text-anchor="end" class="muted">56.7 mm/s filament</text>

  <rect x="90" y="191" width="380" height="20" fill="#38c98b" opacity="0.28" rx="5"/>
  <text x="280" y="186" text-anchor="middle" fill="#38c98b" font-size="13">on-silicon reserve-qualified range</text>

  <line x1="229" y1="126" x2="229" y2="238" stroke="#4a8fe7" stroke-width="4"/>
  <circle cx="229" cy="126" r="7" fill="#4a8fe7"/>
  <text x="229" y="105" text-anchor="middle" font-size="13" font-weight="700">7.3k</text>
  <text x="229" y="88" text-anchor="middle" class="muted">hot path: 3,529/3,529 pulses audited</text>

  <line x1="470" y1="113" x2="470" y2="238" stroke="#38c98b" stroke-width="4"/>
  <circle cx="470" cy="113" r="8" fill="#38c98b"/>
  <text x="470" y="91" text-anchor="middle" font-size="13" font-weight="700">20k PASS</text>
  <text x="470" y="73" text-anchor="middle" class="muted">1/8-step spatial bound + 25% deadline reserve</text>

  <line x1="850" y1="113" x2="850" y2="238" stroke="#ec6a6a" stroke-width="4" stroke-dasharray="7 5"/>
  <circle cx="850" cy="113" r="8" fill="#ec6a6a"/>
  <text x="850" y="91" text-anchor="middle" font-size="13" font-weight="700">40k REJECT</text>
  <text x="888" y="73" text-anchor="end" class="muted">20.4 us solve exceeded 18.75 us reserve budget</text>

  <text x="26" y="330" class="muted">The interval from 20k to 40k is unqualified, not assumed to pass or fail. The 40k probe did not satisfy the reserve policy.</text>
</svg>
