<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Loaded-print USB SOF interrupt attribution</title>
  <desc id="desc">Of 156 exact requested-frame misses, 132 occurred in timer dispatch, 15 in trajectory ingestion, one in timer maintenance, and eight at the idle transition. One hundred forty-eight were proven to arrive during interrupt masking.</desc>
  <style>
    text { font-family: sans-serif; fill: #20242a; }
    .title { font-size: 24px; font-weight: 600; }
    .label { font-size: 16px; }
    .value { font-size: 15px; font-weight: 600; fill: #ffffff; }
    .axis { stroke: #8b949e; stroke-width: 1; }
    .grid { stroke: #d8dee4; stroke-width: 1; }
    .note { font-size: 15px; fill: #4f5965; }
  </style>
  <rect width="900" height="420" fill="#ffffff"/>
  <text x="40" y="38" class="title">Where requested USB SOFs became pending</text>
  <line x1="240" y1="70" x2="240" y2="330" class="axis"/>
  <line x1="240" y1="330" x2="850" y2="330" class="axis"/>
  <g class="grid">
    <line x1="240" y1="70" x2="240" y2="330"/>
    <line x1="392" y1="70" x2="392" y2="330"/>
    <line x1="544" y1="70" x2="544" y2="330"/>
    <line x1="696" y1="70" x2="696" y2="330"/>
    <line x1="848" y1="70" x2="848" y2="330"/>
  </g>
  <text x="236" y="354" text-anchor="middle" class="label">0</text>
  <text x="392" y="354" text-anchor="middle" class="label">40</text>
  <text x="544" y="354" text-anchor="middle" class="label">80</text>
  <text x="696" y="354" text-anchor="middle" class="label">120</text>
  <text x="848" y="354" text-anchor="middle" class="label">160 events</text>
  <text x="225" y="105" text-anchor="end" class="label">Timer dispatch</text>
  <rect x="240" y="82" width="502" height="34" rx="3" fill="#1967d2"/>
  <text x="730" y="105" text-anchor="end" class="value">132</text>
  <text x="225" y="170" text-anchor="end" class="label">Trajectory ingestion</text>
  <rect x="240" y="147" width="57" height="34" rx="3" fill="#00897b"/>
  <text x="287" y="170" text-anchor="end" class="value">15</text>
  <text x="225" y="235" text-anchor="end" class="label">Timer maintenance</text>
  <rect x="240" y="212" width="4" height="34" rx="2" fill="#7e57c2"/>
  <text x="253" y="235" class="label">1</text>
  <text x="225" y="300" text-anchor="end" class="label">Idle transition</text>
  <rect x="240" y="277" width="30" height="34" rx="3" fill="#f57c00"/>
  <text x="263" y="300" text-anchor="end" class="value">8</text>
  <text x="40" y="386" class="note">148/156 (94.87%) were proven clear before masking and pending at restore; maximum observed guarded interval: 355.98 us.</text>
</svg>
