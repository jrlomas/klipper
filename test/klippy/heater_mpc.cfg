[mcu]
serial: /dev/null
adc_stream_mode: force

[printer]
kinematics: none
max_velocity: 100
max_accel: 1000

[heater_bed]
heater_pin: gpio21
sensor_type: Generic 3950
sensor_pin: gpio27
adc_stream_software_average: 4
adc_stream_filter_alpha: 1.0
control: helix_mpc
# PID remains the explicit host-comparison/fallback baseline.
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
thermal_model_gain: 90.0
thermal_model_tau: 300.0
thermal_prediction_horizon: 30.0
thermal_effort_penalty: 5.0
thermal_integral_gain: 0.0005
thermal_observer_time: 2.0
thermal_output_slew_rate: 0.5
thermal_ambient_temperature: 25.0
heater_control_host_timeout: 5.0
heater_control_autonomous_max_duration: 3600
min_temp: 0
max_temp: 130
