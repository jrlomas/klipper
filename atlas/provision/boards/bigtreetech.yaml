# ---- CAN toolheads ----
- id: btt-ebb36-42-v1.0-f072
  name: BigTreeTech EBB36/EBB42 CAN v1.0 (STM32F072) — constrained
  mcu: stm32f072
  flash_method: katapult-can
  canbus: true
  constrained: true
  usb_ids: ["0483:df11", "1d50:6177"]
  kconfig:
    CONFIG_MACH_STM32F072: "y"
    CONFIG_STM32_FLASH_START_2000: "y"   # 8 KiB Katapult (F0x2 offers _2000; verified in Kconfig)
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_CANBUS: "y"
    CONFIG_STM32_CANBUS_PB8_PB9: "y"
  notes: "F072 = 16 KB RAM, constrained: features that don't fit aren't built here."

