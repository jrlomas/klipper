# BigTreeTech boards. Flash offsets verified against Klipper's
# config/*.cfg headers and src/stm32/Kconfig (the offset->symbol map:
# _2000=8KiB, _7000=28KiB, _8000=32KiB, _C000=48KiB, _10000=64KiB,
# _20000=128KiB[H7], _0000=none). A wrong offset bricks a flash; any
# value that could not be verified is UNCONFIRMED and the planner blocks.

# ---- mainboards ----
- id: btt-octopus-v1.1
  name: BigTreeTech Octopus v1.1 (STM32F446)
  mcu: stm32f446
  flash_method: dfu
  canbus: false
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32F446: "y"
    CONFIG_STM32_FLASH_START_8000: "y"   # 32 KiB bootloader
    CONFIG_STM32_CLOCK_REF_12M: "y"
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"
  notes: >
    Same PCB also ships as F429 (CONFIG_MACH_STM32F429 + 8 MHz clock).

- id: btt-octopus-pro-v1.1-h723
  name: BigTreeTech Octopus Pro v1.1 (STM32H723)
  mcu: stm32h723
  flash_method: dfu
  canbus: false
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32H723: "y"
    CONFIG_STM32_FLASH_START_20000: "y"  # 128 KiB bootloader (H7)
    CONFIG_STM32_CLOCK_REF_25M: "y"
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"

