- id: mks-rumba32
  name: MKS Rumba32 v1.0 (STM32F446)
  mcu: stm32f446
  flash_method: dfu
  canbus: false
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32F446: "y"
    CONFIG_STM32_CLOCK_REF_12M: "y"       # no bootloader offset -> flash at 0x08000000
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"
  notes: >
    Config header specifies no bootloader (flash at 0x08000000) via USB-DFU
    with the BOOT0 jumper. 12 MHz clock is header-confirmed.

- id: mks-skipr
  name: MKS SKIPR v1.x co-processor (STM32F407)
  mcu: stm32f407
  flash_method: dfu
  canbus: true
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32F407: "y"
    CONFIG_STM32_CLOCK_REF_8M: "y"        # UART variant: no bootloader, flash at 0x08000000
    CONFIG_SERIAL: "y"
    CONFIG_STM32_SERIAL_USART1: "y"
  notes: >
    This entry is the STM32F407 co-processor only (SKIPR also runs an
    on-board Linux host). Default UART variant shown; a CAN variant exists
    with a 32 KiB Katapult bootloader (_8000) + USB-to-CAN bridge on
    PB12/PB13. Not in mainline Klipper config/.

- id: mks-thr36-42
  name: MKS THR36 / THR42 CAN toolhead (RP2040)
  mcu: rp2040
  flash_method: rp2040-usb
  canbus: true
  constrained: false
  usb_ids: ["2e8a:0003"]
  kconfig:
    CONFIG_MACH_RP2040: "y"
    CONFIG_USBSERIAL: "y"                 # or CANBUS via the MKS UTC bridge
  notes: >
    RP2040-based (264 KB RAM, not constrained). Hold BOOT, plug USB-C to
    expose RPI-RP2, copy klipper.uf2. Runs direct USB-serial or CAN through
    the separate MKS UTC bridge (mks-utc).

- id: mks-utc
  name: MKS UTC USB-to-CAN bridge (STM32G0B1)
  mcu: stm32g0b1
  flash_method: dfu
  canbus: true
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32G0B1: "y"
    CONFIG_STM32_FLASH_START_2000: "UNCONFIRMED"  # G0B1 8KiB typical, not verified for UTC
    CONFIG_STM32_CLOCK_REF_8M: "UNCONFIRMED"
  notes: >
    CAN bridge half of the THR CAN toolhead pairing. MKS ships prebuilt
    firmware flashed via a DFU script; the exact menuconfig offset/clock
    are not documented in an authoritative header — verify before flashing.
