# MKS (Makerbase) boards. Offsets verified against Klipper config/*.cfg
# headers and the makerbase-mks GitHub; UNCONFIRMED where no authoritative
# header was found (the planner then refuses to flash without confirming).

- id: mks-robin-nano-v1v2
  name: MKS Robin Nano v1.2 / V2 (STM32F103)
  mcu: stm32f103
  flash_method: sdcard
  canbus: false
  constrained: false
  usb_ids: []
  kconfig:
    CONFIG_MACH_STM32F103: "y"
    CONFIG_STM32_FLASH_START_7000: "y"   # 28 KiB bootloader
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_SERIAL: "y"                    # host comms is USART3, not USB
    CONFIG_STM32_SERIAL_USART3: "y"
  notes: >
    Host comms is UART on USART3 (RX PB11 / TX PB10), not USB. Flash with
    scripts/update_mks_robin.py -> Robin_nano.bin on SD, then reboot.

- id: mks-robin-nano-v3
  name: MKS Robin Nano V3 (STM32F407)
  mcu: stm32f407
  flash_method: sdcard
  canbus: false
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32F407: "y"
    CONFIG_STM32_FLASH_START_C000: "y"   # 48 KiB bootloader
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"
  notes: >
    Rename out/klipper.bin to Robin_nano_v3.bin on SD; USB-DFU also works.

