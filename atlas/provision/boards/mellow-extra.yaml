# Additional Mellow/FLY mainboards and CAN toolheads. Confirmed against
# Mellow official docs and Klipper config/*.cfg headers. F072 toolhead
# offsets are marked UNCONFIRMED: sources disagree on whether the F072
# Katapult offset is 8 KiB (_2000) or 16 KiB (_4000), and a wrong offset
# bricks the board — the planner blocks until it is confirmed.

- id: mellow-flyf407zg
  name: Mellow FLYF407ZG (9-stepper FLYBOARD)
  mcu: stm32f407
  flash_method: sdcard
  canbus: false
  constrained: false
  usb_ids: []
  kconfig:
    CONFIG_MACH_STM32F407: "y"
    CONFIG_STM32_FLASH_START_8000: "y"    # 32 KiB bootloader
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"

- id: mellow-fly-super8
  name: Mellow Fly-Super8 (STM32F407)
  mcu: stm32f407
  flash_method: sdcard
  canbus: false
  constrained: false
  usb_ids: []
  kconfig:
    CONFIG_MACH_STM32F407: "y"
    CONFIG_STM32_FLASH_START_8000: "y"    # 32 KiB bootloader
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"

- id: mellow-fly-super8-pro-h723
  name: Mellow Fly-Super8 Pro (STM32H723)
  mcu: stm32h723
  flash_method: katapult-usb
  canbus: true
  constrained: false
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32H723: "y"
    CONFIG_STM32_FLASH_START_20000: "y"   # 128 KiB bootloader (confirmed)
    CONFIG_STM32_CLOCK_REF_25M: "y"       # 25 MHz crystal (confirmed)
    CONFIG_USB: "y"
    CONFIG_USBSERIAL: "y"
  notes: >
    H723 uses the 128 KiB offset and 25 MHz crystal — do NOT use 32 KiB.
    CAN and USB-to-CAN bridge firmware also offered; CAN pins unconfirmed.

- id: mellow-fly-sht36-42-f072
  name: Mellow Fly-SHT36/SHT42 CAN toolhead (STM32F072) — constrained
  mcu: stm32f072
  flash_method: katapult-can
  canbus: true
  constrained: true
  usb_ids: ["0483:df11"]
  kconfig:
    CONFIG_MACH_STM32F072: "y"
    CONFIG_STM32_FLASH_START_2000: "y"    # 8 KiB Katapult (F0x2 offers _2000; verified in Kconfig)
    CONFIG_STM32_CLOCK_REF_8M: "y"
    CONFIG_CANBUS: "y"
    CONFIG_STM32_CANBUS_PB8_PB9: "y"      # 500000 CAN; confirm pins per board silk
  notes: >
    F072 = 16 KB RAM, constrained. The v2 board has two silicon variants
    (APM32F072 -> stm32f072, or pre-2022 GD32F103 -> stm32f103) with the
    same offsets. Ships pre-flashed with Katapult; recovery via DFU.

- id: mellow-fly-sht36-pro-rp2040
  name: Mellow Fly-SHT36 PRO CAN toolhead (RP2040)
  mcu: rp2040
  flash_method: katapult-can
  canbus: true
  constrained: false
  usb_ids: ["2e8a:0003"]
  kconfig:
    CONFIG_MACH_RP2040: "y"
    CONFIG_RP2040_FLASH_START_4000: "y"   # 16 KiB bootloader (confirmed)
    CONFIG_CANBUS: "y"
  notes: >
    The PRO is RP2040-based, NOT STM32 — do not apply F072 settings.
    Confirm RP2040 vs RP2350 and the CAN pins before compiling.
